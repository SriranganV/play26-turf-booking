<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matches | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="play26-hero"><div class="container">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Page</li>
        </ol>
    </nav>
<h1><i class="bi bi-controller me-2"></i>Matches</h1><p>Manage cricket matches</p></div></div>
<div class="container pb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Page</li>
        </ol>
    </nav>

    <div class="toast-container">
        <div th:if="${successMessage}" class="toast play26-toast success" role="alert"><div class="toast-body"><i class="bi bi-check-circle-fill text-success me-2"></i><span th:text="${successMessage}"></span></div></div>
        <div th:if="${errorMessage}" class="toast play26-toast error" role="alert"><div class="toast-body"><i class="bi bi-x-circle-fill text-danger me-2"></i><span th:text="${errorMessage}"></span></div></div>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card primary"><div class="stat-value" th:text="${totalCount} ?: 0">0</div><div class="stat-label">Total</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card accent"><div class="stat-value" th:text="${liveCount} ?: 0">0</div><div class="stat-label">Live</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-value" th:text="${upcomingCount} ?: 0">0</div><div class="stat-label">Upcoming</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card secondary"><div class="stat-value" th:text="${completedCount} ?: 0">0</div><div class="stat-label">Completed</div></div></div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <form id="searchForm" th:action="@{/matches}" method="get" class="search-bar flex-grow-1" style="max-width:400px">
            <i class="bi bi-search"></i><input type="text" id="searchInput" name="q" th:value="${q}" placeholder="Search matches...">
        </form>
        <a th:href="@{/matches/new}" class="btn btn-play26"><i class="bi bi-plus-lg me-1"></i>New Match</a>
    </div>
    <div th:if="${#lists.isEmpty(matches)}" class="empty-state glass-card"><i class="bi bi-controller"></i><p>No matches found</p>
        <a th:href="@{/matches/new}" class="btn btn-play26 mt-2">Schedule First Match</a></div>
    <div class="row g-3">
        <div th:each="m : ${matches}" class="col-md-6">
            <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <span class="badge badge-upcoming" th:text="${m.matchStage} ?: 'LEAGUE'" style="font-size:.7rem">LEAGUE</span>
                    <span class="badge" th:classappend="${m.status == 'LIVE' ? 'badge-live' : (m.status == 'UPCOMING' ? 'badge-upcoming' : (m.status == 'COMPLETED' ? 'badge-completed' : 'badge-cancelled'))}" th:text="${m.status}">STATUS</span>
                </div>
                <div class="text-center my-3">
                    <h5 class="mb-1"><span th:text="${m.teamAName} ?: 'Team A'">Team A</span> <span class="text-muted">vs</span> <span th:text="${m.teamBName} ?: 'Team B'">Team B</span></h5>
                    <small class="text-muted" th:text="${m.tournamentName}">Tournament</small>
                </div>
                <div class="d-flex justify-content-between small mb-2" style="color:var(--play26-text-muted)">
                    <span><i class="bi bi-calendar me-1"></i><span th:text="${m.matchDate}">Date</span></span>
                    <span><i class="bi bi-geo-alt me-1"></i><span th:text="${m.venue} ?: ${m.turfName}">Venue</span></span>
                </div>
                <div th:if="${m.result != null}" class="small text-center mb-2" style="color:var(--play26-accent)" th:text="${m.result}">Result</div>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/matches/view/{id}(id=${m.id})}" class="btn btn-glass btn-sm"><i class="bi bi-eye me-1"></i>View</a>
                    <a th:href="@{/scorecard/match/{id}(id=${m.id})}" class="btn btn-glass btn-sm"><i class="bi bi-clipboard-data me-1"></i>Scorecard</a>
                    <a th:href="@{/matches/edit/{id}(id=${m.id})}" class="btn btn-glass btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
                    <form th:action="@{/matches/delete/{id}(id=${m.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-glass btn-sm text-danger btn-delete" data-confirm="Delete this match?"><i class="bi bi-trash"></i></button></form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body>
</html>
