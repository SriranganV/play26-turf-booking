<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Create Tournament</h2>
            <p class="text-muted mb-0">Create a new cricket tournament.</p>
        </div>
        <a th:href="@{/tournaments}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">
                <i class="bi bi-trophy"></i>
                Tournament Information
            </h5>
        </div>

        <div class="card-body">

            <form th:action="@{/tournaments/save}"
                  th:object="${tournament}"
                  method="post"
                  id="tournamentForm">

                <div class="row g-4">

                    <div class="col-md-6">
                        <label class="form-label">Tournament Name</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{name}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{location}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Start Date</label>
                        <input type="date"
                               class="form-control"
                               th:field="*{startDate}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">End Date</label>
                        <input type="date"
                               class="form-control"
                               th:field="*{endDate}"
                               required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Tournament Type</label>
                        <select class="form-select"
                                th:field="*{tournamentType}">
                            <option value="">Select</option>
                            <option value="League">League</option>
                            <option value="Knockout">Knockout</option>
                            <option value="Round Robin">Round Robin</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select"
                                th:field="*{status}">
                            <option value="UPCOMING">Upcoming</option>
                            <option value="LIVE">Live</option>
                            <option value="COMPLETED">Completed</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea class="form-control"
                                  rows="5"
                                  th:field="*{description}"></textarea>
                    </div>

                </div>

                <hr>

                <div class="d-flex gap-2 justify-content-end">
                    <button type="reset"
                            class="btn btn-outline-secondary">
                        Reset
                    </button>

                    <a th:href="@{/tournaments}"
                       class="btn btn-outline-danger">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-success">
                        <i class="bi bi-check-circle"></i>
                        Save Tournament
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
document.getElementById('tournamentForm').addEventListener('submit',function(e){
    const start=document.querySelector('[name="startDate"]');
    const end=document.querySelector('[name="endDate"]');
    if(start && end && start.value && end.value && end.value<start.value){
        e.preventDefault();
        alert('End Date cannot be earlier than Start Date.');
    }
});
</script>

</body>
</html>
