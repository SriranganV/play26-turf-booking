<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Add Bowling | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="play26-hero"><div class="container"><h1><i class="bi bi-circle me-2"></i>Add Bowling Spell</h1><p>Innings <span th:text="${innings}">1</span></p></div></div>
<div class="container pb-5">
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/dashboard}" style="color:rgba(255,255,255,.8)"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li><li class="breadcrumb-item"><a th:href="@{/scorecard/match/{id}(id=${match.id})}">Scorecard</a></li><li class="breadcrumb-item active">Bowling</li></ol></nav>
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="glass-card">
                <form th:action="@{/scorecard/match/{id}/bowling/save(id=${match.id})}" th:object="${bowlingScore}" method="post">
                    <input type="hidden" th:field="*{scorecardId}"><input type="hidden" name="innings" th:value="${innings}">
                    <div class="row g-3">
                        <div class="col-md-12"><label class="form-label">Bowler *</label>
                            <select class="form-select" th:field="*{playerId}" required><option value="">Select Bowler</option><option th:each="p : ${players}" th:value="${p.id}" th:text="${p.playerName}"></option></select></div>
                        <div class="col-md-4"><label class="form-label">Overs</label><input type="number" step="0.1" class="form-control" th:field="*{overs}" id="bwOvers" min="0"></div>
                        <div class="col-md-4"><label class="form-label">Maidens</label><input type="number" class="form-control" th:field="*{maidens}" min="0"></div>
                        <div class="col-md-4"><label class="form-label">Runs</label><input type="number" class="form-control" th:field="*{runs}" id="bwRuns" min="0"></div>
                        <div class="col-md-4"><label class="form-label">Wickets</label><input type="number" class="form-control" th:field="*{wickets}" min="0"></div>
                        <div class="col-md-4"><label class="form-label">Dots</label><input type="number" class="form-control" th:field="*{dots}" min="0"></div>
                        <div class="col-md-4"><label class="form-label">Wides</label><input type="number" class="form-control" th:field="*{wides}" min="0"></div>
                        <div class="col-md-4"><label class="form-label">No Balls</label><input type="number" class="form-control" th:field="*{noBalls}" min="0"></div>
                        <div class="col-12 d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-play26"><i class="bi bi-plus-lg me-1"></i>Save Spell</button>
                            <a th:href="@{/scorecard/match/{id}(id=${match.id})}" class="btn btn-outline-play26">Done</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="glass-card text-center mb-4">
                <h6 class="text-muted mb-1">Live Economy Rate</h6>
                <div class="fs-1 fw-bold text-accent" id="economyDisplay">0.00</div>
            </div>
            <div class="glass-card">
                <h6 class="section-title">Current Innings Bowling</h6>
                <div class="table-responsive">
                    <table class="table scorecard-table mb-0 text-white">
                        <thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th></th></tr></thead>
                        <tbody>
                            <tr th:each="bw : ${bowlingScores}">
                                <td th:text="${bw.playerName}">Player</td>
                                <td th:text="${bw.overs}">0</td>
                                <td th:text="${bw.maidens}">0</td>
                                <td th:text="${bw.runs}">0</td>
                                <td th:text="${bw.wickets}">0</td>
                                <td><form th:action="@{/scorecard/match/{mid}/bowling/delete/{id}(mid=${match.id},id=${bw.id})}" method="post" class="d-inline">
                                    <input type="hidden" name="innings" th:value="${innings}">
                                    <button type="submit" class="btn btn-link text-danger p-0 m-0 btn-delete" data-confirm="Delete this spell?"><i class="bi bi-x-circle"></i></button></form></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body></html>
