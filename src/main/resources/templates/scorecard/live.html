<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Live Score | PLAY26</title>
    <!-- Auto refresh every 30 seconds -->
    <meta http-equiv="refresh" content="30">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"></head>
<body>
<div class="play26-hero pb-4"><div class="container text-center">
    <div class="mb-2"><span class="badge badge-live fs-6 px-3 py-2"><i class="bi bi-broadcast me-2"></i>LIVE</span></div>
    <h2 class="mt-3"><span th:text="${match.teamAName}">Team A</span> vs <span th:text="${match.teamBName}">Team B</span></h2>
    <p class="mb-0 text-white-50" th:text="${match.tournamentName}">Tournament</p>
</div></div>
<div class="container pb-5">
    <div class="text-center text-muted small mb-4">Last updated: <span th:text="${#temporals.format(#temporals.createNow(), 'HH:mm:ss')}">Time</span> (Refreshes every 30s)</div>
    
    <div th:each="sc, iterStat : ${scorecards}" class="mb-4">
        <!-- Highlight current innings -->
        <div class="glass-card text-center mb-3" th:style="${iterStat.last} ? 'border-color:var(--play26-accent);box-shadow:0 0 20px rgba(67,233,123,0.2)' : ''">
            <h5 class="text-muted"><span th:text="${sc.battingTeamName}">Team</span></h5>
            <div class="fs-1 fw-bold text-white my-2"><span th:text="${sc.totalRuns} ?: 0">0</span>/<span th:text="${sc.totalWickets} ?: 0">0</span></div>
            <div class="fs-5 text-muted">Overs: <span th:text="${sc.totalOvers} ?: '0.0'">0.0</span> <span th:if="${match.overs != null}"> / <span th:text="${match.overs}">20</span></span></div>
            <div th:if="${sc.target != null and sc.target > 0}" class="mt-2 text-play26 fw-bold">Target: <span th:text="${sc.target}">0</span></div>
        </div>
        
        <!-- Currently Batting (only for the active innings, we just show all batters for now in live view for simplicity) -->
        <div class="glass-card mb-3" th:if="${iterStat.last}">
            <h6 class="mb-3 text-play26"><i class="bi bi-bat-fill me-2"></i>Batting</h6>
            <div class="table-responsive">
                <table class="table scorecard-table mb-0 text-white">
                    <thead><tr><th>Batter</th><th class="runs-col">R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
                    <tbody>
                        <tr th:each="bs : ${battingScores[sc.id]}" th:if="${battingScores[sc.id] != null}">
                            <td><span th:text="${bs.playerName}">Player</span><span th:unless="${bs.isOut}" class="badge bg-play26 ms-2" style="font-size:0.6rem">Batting</span></td>
                            <td class="runs-col" th:text="${bs.runs}">0</td><td th:text="${bs.balls}">0</td><td th:text="${bs.fours}">0</td><td th:text="${bs.sixes}">0</td><td th:text="${bs.strikeRate}">0.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <h6 class="mb-3 mt-4 text-play26"><i class="bi bi-circle me-2"></i>Bowling</h6>
            <div class="table-responsive">
                <table class="table scorecard-table mb-0 text-white">
                    <thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Econ</th></tr></thead>
                    <tbody>
                        <tr th:each="bw : ${bowlingScores[sc.id]}" th:if="${bowlingScores[sc.id] != null}">
                            <td th:text="${bw.playerName}">Player</td><td th:text="${bw.overs}">0</td><td th:text="${bw.maidens}">0</td><td th:text="${bw.runs}">0</td><td class="runs-col text-accent" th:text="${bw.wickets}">0</td><td th:text="${bw.economy}">0.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-5">
        <a th:href="@{/matches}" class="btn btn-outline-play26">Back to Matches</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
