<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quick Local Match | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="play26-hero">
    <div class="container">
        <h1><i class="bi bi-lightning-charge-fill me-2 text-warning"></i>Start Quick Match</h1>
        <p>Instantly start scoring without pre-creating teams or players.</p>
    </div>
</div>

<div class="container pb-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}" style="color:rgba(255,255,255,.8)"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/scorecard}" style="color:rgba(255,255,255,.8)">Scorecard</a></li>
            <li class="breadcrumb-item active">Quick Match</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-card mt-4">
                <form th:action="@{/scorecard/quick-match/save}" th:object="${quickMatch}" method="post">
                    <h5 class="mb-4 text-accent border-bottom border-secondary pb-2"><i class="bi bi-info-circle me-2"></i>Match Details</h5>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-light">Team A Name *</label>
                            <input type="text" class="form-control" th:field="*{teamAName}" required placeholder="e.g. Mumbai Indians">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light">Team B Name *</label>
                            <input type="text" class="form-control" th:field="*{teamBName}" required placeholder="e.g. Chennai Super Kings">
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label text-light">Overs *</label>
                            <input type="number" class="form-control" th:field="*{overs}" required min="1" value="20">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">Match Date</label>
                            <input type="date" class="form-control" th:field="*{matchDate}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">Match Time</label>
                            <input type="time" class="form-control" th:field="*{matchTime}">
                        </div>
                        
                        <div class="col-md-12">
                            <label class="form-label text-light">Venue</label>
                            <input type="text" class="form-control" th:field="*{venue}" placeholder="e.g. Wankhede Stadium">
                        </div>
                    </div>

                    <h5 class="mb-4 text-accent border-bottom border-secondary pb-2"><i class="bi bi-coin me-2"></i>Toss Details</h5>
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-light">Toss Winner</label>
                            <select class="form-select" th:field="*{tossWinner}">
                                <option value="">Select Team</option>
                                <option value="TEAM_A">Team A</option>
                                <option value="TEAM_B">Team B</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light">Decision</label>
                            <select class="form-select" th:field="*{tossDecision}">
                                <option value="">Select Decision</option>
                                <option value="BAT">Bat First</option>
                                <option value="BOWL">Bowl First</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-5">
                        <a th:href="@{/scorecard}" class="btn btn-outline-play26">Cancel</a>
                        <button type="submit" class="btn btn-play26 px-4"><i class="bi bi-play-fill me-1"></i>Start Match</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body>
</html>
