<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="page-shell">
    <h1>All Bookings</h1>

    <div class="table-wrap">
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Email</th>
                <th>Turf</th>
                <th>Location</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(bookings)}">
                <td colspan="9">No bookings yet.</td>
            </tr>

            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.id}">1</td>
                <td th:text="${booking.userName}">User Name</td>
                <td th:text="${booking.userEmail}">user@email.com</td>
                <td th:text="${booking.turfName}">Green Arena</td>
                <td th:text="${booking.turfLocation}">City Center</td>
                <td th:text="${booking.slotDate}">2026-06-24</td>
                <td>
                    <span th:text="${booking.startTime}">18:00</span>
                    -
                    <span th:text="${booking.endTime}">19:00</span>
                </td>
                <td th:text="${booking.bookingStatus}">CONFIRMED</td>
                <td>
    <form th:action="@{/admin/bookings/cancel/{id}(id=${booking.id})}"
          method="post"
          th:if="${booking.bookingStatus == 'CONFIRMED'}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="button small danger" type="submit">Cancel</button>
    </form>

    <span class="muted" th:if="${booking.bookingStatus == 'CANCELLED'}">
        Cancelled
    </span>
</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
