<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboards | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .leaderboard-table th { background: rgba(255, 255, 255, 0.05); color: var(--play26-accent); }
        .leaderboard-table td, .leaderboard-table th { border-color: rgba(255, 255, 255, 0.05); }
        .rank-badge { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FDB931); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #E0E0E0); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #A0522D); color: #fff; }
        .rank-other { background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <div class="play26-hero">
        <div class="container">
            <h1 class="display-4 fw-bold"><i class="bi bi-trophy-fill me-2 text-warning"></i>Global Leaderboards</h1>
            <p class="lead">Real-time standings from the world's top sports leagues.</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <!-- IPL Leaderboard -->
            <div class="col-lg-6">
                <div class="glass-card h-100">
                    <h3 class="mb-4 d-flex align-items-center">
                        <i class="bi bi-circle-fill text-accent me-2 fs-6"></i> IPL Standings
                    </h3>
                    <div class="table-responsive">
                        <table class="table table-hover text-white leaderboard-table align-middle">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Team</th>
                                    <th>P</th>
                                    <th>W</th>
                                    <th>L</th>
                                    <th>Pts</th>
                                    <th>NRR</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="team : ${iplStandings}">
                                    <td>
                                        <span th:class="'rank-badge ' + (${team.rank} == 1 ? 'rank-1' : (${team.rank} == 2 ? 'rank-2' : (${team.rank} == 3 ? 'rank-3' : 'rank-other')))" th:text="${team.rank}">1</span>
                                    </td>
                                    <td class="fw-bold" th:text="${team.teamName}">Team Name</td>
                                    <td th:text="${team.matchesPlayed}">0</td>
                                    <td th:text="${team.won}">0</td>
                                    <td th:text="${team.lost}">0</td>
                                    <td class="fw-bold text-accent" th:text="${team.points}">0</td>
                                    <td class="text-muted" th:text="${team.netRunRate}">+0.00</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(iplStandings)}">
                                    <td colspan="7" class="text-center text-muted py-4">No data available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Premier League Leaderboard -->
            <div class="col-lg-6">
                <div class="glass-card h-100">
                    <h3 class="mb-4 d-flex align-items-center">
                        <i class="bi bi-circle-fill text-primary me-2 fs-6"></i> Premier League
                    </h3>
                    <div class="table-responsive">
                        <table class="table table-hover text-white leaderboard-table align-middle">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Team</th>
                                    <th>P</th>
                                    <th>W</th>
                                    <th>D</th>
                                    <th>L</th>
                                    <th>Pts</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="team : ${premierLeague}">
                                    <td>
                                        <span th:class="'rank-badge ' + (${team.rank} == 1 ? 'rank-1' : (${team.rank} == 2 ? 'rank-2' : (${team.rank} == 3 ? 'rank-3' : 'rank-other')))" th:text="${team.rank}">1</span>
                                    </td>
                                    <td class="fw-bold" th:text="${team.teamName}">Team Name</td>
                                    <td th:text="${team.matchesPlayed}">0</td>
                                    <td th:text="${team.won}">0</td>
                                    <td th:text="${team.drawn}">0</td>
                                    <td th:text="${team.lost}">0</td>
                                    <td class="fw-bold text-accent" th:text="${team.points}">0</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(premierLeague)}">
                                    <td colspan="7" class="text-center text-muted py-4">No data available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/play26.js}"></script>
</body>
</html>
