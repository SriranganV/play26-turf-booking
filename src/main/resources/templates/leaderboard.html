<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<!-- Hero Section -->
<div class="play26-hero">
    <div class="container text-center pt-4">
        <h1><i class="bi bi-bar-chart-fill me-2"></i>Global Leaderboards</h1>
        <p class="mb-0 text-light opacity-75">Live Points Tables & Standings</p>
    </div>
</div>

<div class="container" style="margin-top: -40px; position: relative; z-index: 10; padding-bottom: 80px;">
    <div class="solid-card p-5 shadow">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h3 class="text-heading fw-bold mb-0">Points Table</h3>
            <div>
                <select class="form-select fw-bold border-2" id="leagueSelect" onchange="showTable(this.value)" style="width: 280px;">
                    <option value="PL">Premier League</option>
                    <option value="WC">FIFA World Cup</option>
                    <option value="CL">UEFA Champions League</option>
                    <option value="BL1">Bundesliga</option>
                    <option value="FL1">Ligue 1</option>
                    <option value="SA">Serie A</option>
                    <option value="IPL">Indian Premier League</option>
                </select>
            </div>
        </div>

        <!-- FOOTBALL TABLES FRAGMENT -->
        <th:block th:each="league : ${ {'PL':'premierLeague', 'WC':'worldCup', 'CL':'championsLeague', 'BL1':'bundesliga', 'FL1':'ligue1', 'SA':'serieA'} }">
            <div class="table-responsive solid-card p-0 football-table hover-lift" th:id="'table-' + ${league.key}" th:classappend="${league.key != 'PL'} ? 'd-none' : ''">
                <table class="table table-custom mb-0 align-middle">
                    <thead>
                        <tr>
                            <th class="text-center">#</th>
                            <th>Club</th>
                            <th class="text-center" title="Played">MP</th>
                            <th class="text-center" title="Won">W</th>
                            <th class="text-center" title="Drawn">D</th>
                            <th class="text-center" title="Lost">L</th>
                            <th class="text-center d-none d-md-table-cell" title="Goals For">GF</th>
                            <th class="text-center d-none d-md-table-cell" title="Goals Against">GA</th>
                            <th class="text-center" title="Goal Difference">GD</th>
                            <th class="text-center text-primary fs-6">Pts</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Use dynamic evaluation to get the correct model attribute based on the map value -->
                        <tr th:each="team : ${__${league.value}__}" style="cursor: pointer;">
                            <td class="text-center fw-bold" th:text="${team.rank}">1</td>
                            <td class="fw-bold text-heading">
                                <img th:src="${team.teamLogoUrl}" alt="logo" style="width: 24px; height: 24px; object-fit: contain; margin-right: 10px;" th:if="${team.teamLogoUrl != null and !team.teamLogoUrl.isEmpty() and team.teamLogoUrl != 'null'}">
                                <span th:text="${team.teamName}">Team</span>
                            </td>
                            <td class="text-center" th:text="${team.matchesPlayed}">38</td>
                            <td class="text-center text-success" th:text="${team.won}">30</td>
                            <td class="text-center text-secondary" th:text="${team.drawn}">5</td>
                            <td class="text-center text-danger" th:text="${team.lost}">3</td>
                            <td class="text-center d-none d-md-table-cell" th:text="${team.goalsFor}">80</td>
                            <td class="text-center d-none d-md-table-cell" th:text="${team.goalsAgainst}">30</td>
                            <td class="text-center fw-semibold" th:text="${team.goalDifference}">+50</td>
                            <td class="text-center fw-bold fs-5 text-primary" th:text="${team.points}">95</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(__${league.value}__)}">
                            <td colspan="10" class="text-center py-5 text-muted">
                                <i class="bi bi-cone-striped fs-1 d-block mb-3"></i>
                                Standings not available at the moment.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </th:block>

        <!-- Cricket Table -->
        <div class="table-responsive solid-card p-0 d-none hover-lift" id="table-IPL">
            <table class="table table-custom mb-0 align-middle">
                <thead>
                    <tr>
                        <th class="text-center">#</th>
                        <th>Franchise</th>
                        <th class="text-center" title="Matches">M</th>
                        <th class="text-center" title="Won">W</th>
                        <th class="text-center" title="Lost">L</th>
                        <th class="text-center" title="Net Run Rate">NRR</th>
                        <th class="text-center text-primary fs-6">Pts</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="team : ${iplStandings}" style="cursor: pointer;">
                        <td class="text-center fw-bold" th:text="${team.rank}">1</td>
                        <td class="fw-bold text-heading" th:text="${team.teamName}">Team</td>
                        <td class="text-center" th:text="${team.matchesPlayed}">14</td>
                        <td class="text-center text-success" th:text="${team.won}">10</td>
                        <td class="text-center text-danger" th:text="${team.lost}">4</td>
                        <td class="text-center fw-semibold" th:classappend="${team.netRunRate > 0 ? 'text-success' : 'text-danger'}" th:text="${team.netRunRate > 0 ? '+' + team.netRunRate : team.netRunRate}">+0.500</td>
                        <td class="text-center fw-bold fs-5 text-primary" th:text="${team.points}">20</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(iplStandings)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="bi bi-cone-striped fs-1 d-block mb-3"></i>
                            Standings not available at the moment.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>

<!-- Table Switcher Script -->
<script>
    function showTable(league) {
        // Hide all tables (Football + IPL)
        document.querySelectorAll('[id^="table-"]').forEach(el => el.classList.add('d-none'));
        
        // Show the selected one
        const selectedTable = document.getElementById('table-' + league);
        if(selectedTable) {
            selectedTable.classList.remove('d-none');
        }
    }
</script>

</body>
</html>
