<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | PLAY26'">Tournaments | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div class="play26-hero">
    <div class="container">
        <h1><i class="bi bi-trophy-fill me-2"></i>Tournaments</h1>
        <p>Manage cricket tournaments</p>
    </div>
</div>
<div class="container pb-5">
    <!-- Toast -->
    <div class="toast-container">
        <div th:if="${successMessage}" class="toast play26-toast success" role="alert">
            <div class="toast-body"><i class="bi bi-check-circle-fill text-success me-2"></i><span th:text="${successMessage}"></span></div></div>
        <div th:if="${errorMessage}" class="toast play26-toast error" role="alert">
            <div class="toast-body"><i class="bi bi-x-circle-fill text-danger me-2"></i><span th:text="${errorMessage}"></span></div></div>
    </div>
    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card primary"><div class="stat-value" th:text="${totalCount} ?: 0">0</div><div class="stat-label">Total</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card accent"><div class="stat-value" th:text="${liveCount} ?: 0">0</div><div class="stat-label">Live</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-value" th:text="${upcomingCount} ?: 0">0</div><div class="stat-label">Upcoming</div></div></div>
        <div class="col-6 col-md-3"><div class="stat-card secondary"><div class="stat-value" th:text="${completedCount} ?: 0">0</div><div class="stat-label">Completed</div></div></div>
    </div>
    <!-- Search + Add -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <form id="searchForm" th:action="@{/tournaments}" method="get" class="search-bar flex-grow-1" style="max-width:400px">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" name="q" th:value="${q}" placeholder="Search tournaments...">
        </form>
        <a th:href="@{/tournaments/new}" class="btn btn-play26"><i class="bi bi-plus-lg me-1"></i>New Tournament</a>
    </div>
    <!-- List -->
    <div th:if="${#lists.isEmpty(tournaments)}" class="empty-state glass-card"><i class="bi bi-trophy"></i><p>No tournaments found</p>
        <a th:href="@{/tournaments/new}" class="btn btn-play26 mt-2">Create First Tournament</a></div>
    <div class="row g-3">
        <div th:each="t : ${tournaments}" class="col-md-6 col-lg-4">
            <div class="glass-card h-100">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="mb-0" th:text="${t.tournamentName}">Tournament</h5>
                    <span class="badge" th:classappend="${t.status == 'LIVE' ? 'badge-live' : (t.status == 'UPCOMING' ? 'badge-upcoming' : (t.status == 'COMPLETED' ? 'badge-completed' : 'badge-cancelled'))}" th:text="${t.status}">STATUS</span>
                </div>
                <p class="text-muted small mb-2" th:text="${t.venue}">Venue</p>
                <div class="d-flex gap-2 small mb-2" style="color:var(--play26-text-muted)">
                    <span><i class="bi bi-controller me-1"></i><span th:text="${t.matchType}">T20</span></span>
                    <span><i class="bi bi-people me-1"></i><span th:text="${t.registeredTeams}">0</span>/<span th:text="${t.maximumTeams}">8</span></span>
                </div>
                <div class="small mb-3" style="color:var(--play26-text-muted)">
                    <i class="bi bi-calendar me-1"></i><span th:text="${t.startDate}">Start</span> &mdash; <span th:text="${t.endDate}">End</span>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/tournaments/view/{id}(id=${t.id})}" class="btn btn-glass btn-sm"><i class="bi bi-eye me-1"></i>View</a>
                    <a th:href="@{/tournaments/edit/{id}(id=${t.id})}" class="btn btn-glass btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
                    <form th:action="@{/tournaments/delete/{id}(id=${t.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-glass btn-sm text-danger btn-delete" data-confirm="Delete this tournament?"><i class="bi bi-trash me-1"></i>Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body>
</html>
