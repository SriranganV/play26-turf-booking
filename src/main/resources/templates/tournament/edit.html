<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | PLAY26'">Edit Tournament | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="play26-hero"><div class="container"><h1><i class="bi bi-pencil-square me-2"></i>Edit Tournament</h1></div></div>
<div class="container pb-5">
    <nav aria-label="breadcrumb"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/dashboard}" style="color:rgba(255,255,255,.8)"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li><li class="breadcrumb-item"><a th:href="@{/tournaments}">Tournaments</a></li><li class="breadcrumb-item active">Edit</li></ol></nav>
    <div class="glass-card">
        <form th:action="@{/tournaments/update}" th:object="${tournament}" method="post" data-loading>
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-md-8"><label class="form-label">Tournament Name *</label><input type="text" class="form-control" th:field="*{tournamentName}" placeholder="e.g. Summer Cup 2026" required></div>
                <div class="col-md-4"><label class="form-label">Status</label>
                    <select class="form-select" th:field="*{status}"><option value="UPCOMING">Upcoming</option><option value="LIVE">Live</option><option value="COMPLETED">Completed</option><option value="CANCELLED">Cancelled</option></select></div>
                <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" th:field="*{description}" rows="3" placeholder="Enter tournament details..."></textarea></div>
                <div class="col-md-4"><label class="form-label">Tournament Type</label>
                    <select class="form-select" th:field="*{tournamentType}"><option value="">Select</option><option value="LEAGUE">League</option><option value="KNOCKOUT">Knockout</option><option value="GROUP_STAGE">Group Stage</option></select></div>
                <div class="col-md-4"><label class="form-label">Match Type</label>
                    <select class="form-select" th:field="*{matchType}"><option value="">Select</option><option value="T20">T20</option><option value="ODI">ODI</option><option value="TEST">Test</option><option value="T10">T10</option><option value="CUSTOM">Custom</option></select></div>
                <div class="col-md-4"><label class="form-label">Overs</label><input type="number" class="form-control" th:field="*{overs}" placeholder="e.g. 20" min="1"></div>
                <div class="col-md-4"><label class="form-label">Ball Type</label>
                    <select class="form-select" th:field="*{ballType}"><option value="">Select</option><option value="LEATHER">Leather</option><option value="TENNIS">Tennis</option><option value="RUBBER">Rubber</option><option value="SYNTHETIC">Synthetic</option></select></div>
                <div class="col-md-4"><label class="form-label">Entry Fee (₹)</label><input type="number" class="form-control" th:field="*{entryFee}" placeholder="1000" step="0.01" min="0"></div>
                <div class="col-md-4"><label class="form-label">Prize Pool (₹)</label><input type="number" class="form-control" th:field="*{prizePool}" placeholder="50000" step="0.01" min="0"></div>
                <div class="col-md-4"><label class="form-label">Maximum Teams</label><input type="number" class="form-control" th:field="*{maximumTeams}" placeholder="16" min="2"></div>
                <div class="col-md-8"><label class="form-label">Venue</label><input type="text" class="form-control" th:field="*{venue}" placeholder="e.g. Main Ground"></div>
                <div class="col-md-4"><label class="form-label">Start Date</label><input type="date" class="form-control" th:field="*{startDate}"></div>
                <div class="col-md-4"><label class="form-label">End Date</label><input type="date" class="form-control" th:field="*{endDate}"></div>
                <div class="col-md-4"><label class="form-label">Banner URL</label><input type="url" class="form-control" th:field="*{banner}" placeholder="https://..." data-preview="bannerPreview"></div>
                <div class="col-12"><img id="bannerPreview" th:src="${tournament.banner}" alt="Banner" class="img-fluid rounded" style="max-height:200px" th:style="${tournament.banner == null} ? 'display:none' : ''"></div>
                <div class="col-12"><label class="form-label">Rules</label><textarea class="form-control" th:field="*{rules}" rows="4"></textarea></div>
                <div class="col-12 d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-play26"><i class="bi bi-check-lg me-1"></i>Update Tournament</button>
                    <a th:href="@{/tournaments/view/{id}(id=${tournament.id})}" class="btn btn-outline-play26">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body>
</html>
