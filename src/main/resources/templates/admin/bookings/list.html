<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="fw-bold mb-1 text-heading"><i class="bi bi-journal-bookmark text-play26 me-2"></i> All Bookings</h1>
            <p class="mb-0 text-muted">View and manage all turf bookings.</p>
        </div>
    </div>

    <div class="solid-card p-0 hover-lift table-responsive">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-custom mb-0 align-middle">
                    <thead>
                        <tr>
                            <th class="px-4 text-center">ID</th>
                            <th>User</th>
                            <th>Email</th>
                            <th>Turf</th>
                            <th>Location</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th class="px-4 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="9" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                <span class="fs-5">No bookings yet.</span>
                            </td>
                        </tr>
                        <tr th:each="booking : ${bookings}">
                            <td class="px-4 fw-bold text-center" th:text="${booking.id}">1</td>
                            <td class="fw-semibold text-heading" th:text="${booking.userName}">User Name</td>
                            <td><i class="bi bi-envelope text-muted me-1"></i> <span th:text="${booking.userEmail}"></span></td>
                            <td class="fw-semibold text-play26" th:text="${booking.turfName}">Green Arena</td>
                            <td><i class="bi bi-geo-alt text-muted me-1"></i><span class="text-muted" th:text="${booking.turfLocation}">City Center</span></td>
                            <td><i class="bi bi-calendar text-muted me-1"></i> <span th:text="${booking.slotDate}"></span></td>
                            <td>
                                <i class="bi bi-clock text-muted me-1"></i> 
                                <span th:text="${booking.startTime}"></span> - <span th:text="${booking.endTime}"></span>
                            </td>
                            <td>
                                <span class="badge badge-live" th:if="${booking.bookingStatus == 'CONFIRMED'}"><i class="bi bi-check-circle me-1"></i> Confirmed</span>
                                <span class="badge badge-cancelled" th:if="${booking.bookingStatus == 'CANCELLED'}"><i class="bi bi-x-circle me-1"></i> Cancelled</span>
                                <span class="badge badge-upcoming" th:if="${booking.bookingStatus != 'CONFIRMED' and booking.bookingStatus != 'CANCELLED'}"><span th:text="${booking.bookingStatus}"></span></span>
                            </td>
                            <td class="px-4 text-end">
                                <form th:action="@{/admin/bookings/cancel/{id}(id=${booking.id})}" method="post" th:if="${booking.bookingStatus == 'CONFIRMED'}" class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-x-square me-1"></i>Cancel Booking</button>
                                </form>
                                <span class="text-muted fst-italic" th:if="${booking.bookingStatus == 'CANCELLED'}">Cancelled</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
