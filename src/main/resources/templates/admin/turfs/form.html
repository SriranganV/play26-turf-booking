<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card glass-card bg-dark text-white border-0 shadow-lg rounded-4 p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="fw-bold mb-1"><i class="bi bi-building-add"></i> <span th:text="${pageTitle}">Add Turf</span></h1>
                    <p class="text-white-50 mb-0">Fill in the turf details below</p>
                </div>

                <form th:action="@{${formAction}}" th:object="${turf}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-floating mb-3">
                        <input id="name" type="text" class="form-control bg-dark text-white border-secondary" th:field="*{name}" placeholder="Turf Name" required>
                        <label for="name" class="text-white-50">Turf Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input id="location" type="text" class="form-control bg-dark text-white border-secondary" th:field="*{location}" placeholder="Location" required>
                        <label for="location" class="text-white-50">Location</label>
                    </div>

                    <div class="form-floating mb-3">
                        <textarea id="description" class="form-control bg-dark text-white border-secondary" th:field="*{description}" placeholder="Description" style="height: 120px;"></textarea>
                        <label for="description" class="text-white-50">Description (Facilities, parking, etc.)</label>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input id="pricePerHour" type="number" class="form-control bg-dark text-white border-secondary" th:field="*{pricePerHour}" min="0" step="0.01" placeholder="Price Per Hour" required>
                                <label for="pricePerHour" class="text-white-50">Price Per Hour</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input id="supportedSports" type="text" class="form-control bg-dark text-white border-secondary" th:field="*{supportedSports}" placeholder="Cricket, Football..." required>
                                <label for="supportedSports" class="text-white-50">Supported Sports</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-check form-switch mb-4 mt-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="active" th:field="*{active}">
                        <label class="form-check-label text-white" for="active">Active Status</label>
                    </div>

                    <div class="d-flex gap-3 pt-2">
                        <button class="btn btn-primary btn-glass flex-grow-1 py-3 fw-bold" type="submit">
                            <i class="bi bi-check2-circle"></i> Save Turf
                        </button>
                        <a class="btn btn-outline-light flex-grow-1 py-3 fw-bold" th:href="@{/admin/turfs}">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
