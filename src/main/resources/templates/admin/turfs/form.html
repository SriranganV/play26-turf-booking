<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container py-5" style="background: #f8fafc; min-height: 100vh;">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5" style="background: #ffffff; border-top: 4px solid #0F6E56 !important;">
                <div class="text-center mb-4">
                    <h1 class="fw-bold mb-1" style="color: #0f172a;"><i class="bi bi-building-add" style="color: #0F6E56;"></i> <span th:text="${pageTitle}">Add Turf</span></h1>
                    <p class="text-muted mb-0">Fill in the turf details below</p>
                </div>

                <form th:action="@{${formAction}}" th:object="${turf}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-floating mb-3">
                        <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Turf Name" required style="border: 1px solid #cbd5e1; border-radius: 10px;">
                        <label for="name" class="text-muted">Turf Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input id="location" type="text" class="form-control" th:field="*{location}" placeholder="Location" required style="border: 1px solid #cbd5e1; border-radius: 10px;">
                        <label for="location" class="text-muted">Location</label>
                    </div>

                    <div class="form-floating mb-3">
                        <textarea id="description" class="form-control" th:field="*{description}" placeholder="Description" style="height: 120px; border: 1px solid #cbd5e1; border-radius: 10px;"></textarea>
                        <label for="description" class="text-muted">Description (Facilities, parking, etc.)</label>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input id="pricePerHour" type="number" class="form-control" th:field="*{pricePerHour}" min="0" step="0.01" placeholder="Price Per Hour" required style="border: 1px solid #cbd5e1; border-radius: 10px;">
                                <label for="pricePerHour" class="text-muted">Price Per Hour (₹)</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating mb-3">
                                <input id="supportedSports" type="text" class="form-control" th:field="*{supportedSports}" placeholder="Cricket, Football..." required style="border: 1px solid #cbd5e1; border-radius: 10px;">
                                <label for="supportedSports" class="text-muted">Supported Sports</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-check form-switch mb-4 mt-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="active" th:field="*{active}">
                        <label class="form-check-label text-dark fw-bold" for="active">Active Status</label>
                    </div>

                    <div class="d-flex gap-3 pt-2">
                        <button class="btn flex-grow-1 py-3 fw-bold" type="submit" style="background: #0F6E56; color: white; border-radius: 12px; box-shadow: 0 4px 12px rgba(15, 110, 86, 0.2);">
                            <i class="bi bi-check2-circle"></i> Save Turf
                        </button>
                        <a class="btn flex-grow-1 py-3 fw-bold" th:href="@{/admin/turfs}" style="background: #fff; color: #0F6E56; border: 2px solid #0F6E56; border-radius: 12px;">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
