<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold mb-1"><i class="bi bi-geo-alt-fill me-2"></i>Manage Turfs</h1>
            <p class="text-muted mb-0">Add, edit, deactivate, and delete turf grounds.</p>
        </div>

        <a class="btn btn-play26" th:href="@{/admin/turfs/new}"><i class="bi bi-plus-circle me-1"></i>Add Turf</a>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="solid-card p-0 hover-lift table-responsive">
        <table class="table table-custom mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Turf Name</th>
                <th>Location</th>
                <th>Sports</th>
                <th>Price / Hour</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(turfs)}">
                <td colspan="7">No turfs added yet.</td>
            </tr>

            <tr th:each="turf : ${turfs}">
                <td th:text="${turf.id}">1</td>
                <td th:text="${turf.name}">Green Arena</td>
                <td th:text="${turf.location}">City Center</td>
                <td th:text="${turf.supportedSports}">Cricket, Football</td>
                <td th:text="${turf.pricePerHour}">1000</td>
                <td>
                    <span class="status active" th:if="${turf.active}">Active</span>
                    <span class="status inactive" th:unless="${turf.active}">Inactive</span>
                </td>
                <td class="text-end">
                    <div class="d-flex justify-content-end gap-2">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/admin/turfs/edit/{id}(id=${turf.id})}">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>

                        <form th:action="@{/admin/turfs/deactivate/{id}(id=${turf.id})}"
                              method="post"
                              th:if="${turf.active}" class="m-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-warning" type="submit"><i class="bi bi-pause-circle me-1"></i>Deactivate</button>
                        </form>

                        <form th:action="@{/admin/turfs/delete/{id}(id=${turf.id})}"
                              method="post" class="m-0" onsubmit="return confirm('Delete this turf permanently?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-trash me-1"></i>Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
