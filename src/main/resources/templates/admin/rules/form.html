<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card glass-card bg-dark text-white border-0 shadow-lg rounded-4 p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="fw-bold mb-1"><i class="bi bi-card-checklist"></i> <span th:text="${pageTitle}">Add Sports Rule</span></h1>
                    <p class="text-white-50 mb-0">Define guidelines for specific sports</p>
                </div>

                <form th:action="@{${formAction}}" th:object="${rule}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-floating mb-3">
                        <select id="sportName" class="form-select bg-dark text-white border-secondary" th:field="*{sportName}" required>
                            <option value="">Choose sport...</option>
                            <option value="Cricket">Cricket</option>
                            <option value="Football">Football</option>
                            <option value="Kabaddi">Kabaddi</option>
                            <option value="Badminton">Badminton</option>
                            <option value="Volleyball">Volleyball</option>
                            <option value="Basketball">Basketball</option>
                        </select>
                        <label for="sportName" class="text-white-50">Sport Name</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input id="title" type="text" class="form-control bg-dark text-white border-secondary" th:field="*{title}" placeholder="Basic Rules" required>
                        <label for="title" class="text-white-50">Rule Title</label>
                    </div>

                    <div class="form-floating mb-4">
                        <textarea id="content" class="form-control bg-dark text-white border-secondary" th:field="*{content}" placeholder="Write rules here..." style="height: 150px;" required></textarea>
                        <label for="content" class="text-white-50">Rule Content</label>
                    </div>

                    <div class="d-flex gap-3 pt-2">
                        <button class="btn btn-primary btn-glass flex-grow-1 py-3 fw-bold" type="submit">
                            <i class="bi bi-check2-circle"></i> Save Rule
                        </button>
                        <a class="btn btn-outline-light flex-grow-1 py-3 fw-bold" th:href="@{/admin/rules}">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
