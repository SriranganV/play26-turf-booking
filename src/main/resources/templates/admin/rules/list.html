<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div>
            <h1 class="fw-bold mb-1 text-heading"><i class="bi bi-card-checklist text-play26"></i> Manage Sports Rules</h1>
            <p class="mb-0 text-muted">Add and manage rules for cricket, football, kabaddi, and other sports.</p>
        </div>
        <a class="btn btn-play26" th:href="@{/admin/rules/new}">
            <i class="bi bi-plus-circle me-1"></i> Add Rule
        </a>
    </div>

    <div class="alert alert-success bg-transparent border-success text-success" th:if="${successMessage}">
        <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
    </div>
    <div class="alert alert-danger bg-transparent border-danger text-danger" th:if="${errorMessage}">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
    </div>

    <div class="solid-card p-0 hover-lift table-responsive">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-custom mb-0 align-middle">
                    <thead>
                        <tr>
                            <th class="px-4 text-center">ID</th>
                            <th>Sport</th>
                            <th>Title</th>
                            <th>Content</th>
                            <th class="px-4 text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(rules)}">
                            <td colspan="5" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-3"></i>
                                <span class="fs-5">No rules added yet.</span>
                            </td>
                        </tr>
                        <tr th:each="rule : ${rules}">
                            <td class="px-4 fw-bold text-center" th:text="${rule.id}">1</td>
                            <td>
                                <span class="badge badge-upcoming px-2 py-1"><i class="bi bi-trophy me-1"></i> <span th:text="${rule.sportName}"></span></span>
                            </td>
                            <td class="fw-semibold text-heading" th:text="${rule.title}">Basic Rules</td>
                            <td class="text-muted" th:text="${#strings.abbreviate(rule.content, 120)}">Rule content</td>
                            <td class="px-4 text-end">
                                <div class="d-flex gap-2 justify-content-end">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/rules/edit/{id}(id=${rule.id})}">
                                        <i class="bi bi-pencil me-1"></i> Edit
                                    </a>
                                    <form th:action="@{/admin/rules/delete/{id}(id=${rule.id})}" method="post" class="m-0" onsubmit="return confirm('Delete this rule?');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-trash me-1"></i> Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
