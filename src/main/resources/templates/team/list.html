<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Teams | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>

<div class="play26-hero"><div class="container">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Page</li>
        </ol>
    </nav>
<h1><i class="bi bi-people-fill me-2"></i>Teams</h1><p>Manage cricket teams</p></div></div>
<div class="container pb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
            <li class="breadcrumb-item active" th:text="${pageTitle}">Page</li>
        </ol>
    </nav>

    <div class="toast-container">
        <div th:if="${successMessage}" class="toast play26-toast success" role="alert"><div class="toast-body"><i class="bi bi-check-circle-fill text-success me-2"></i><span th:text="${successMessage}"></span></div></div>
        <div th:if="${errorMessage}" class="toast play26-toast error" role="alert"><div class="toast-body"><i class="bi bi-x-circle-fill text-danger me-2"></i><span th:text="${errorMessage}"></span></div></div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">Total: <span class="text-play26" th:text="${totalCount} ?: 0">0</span></h5>
        <a th:href="@{/teams/new}" class="btn btn-play26"><i class="bi bi-plus-lg me-1"></i>New Team</a>
    </div>
    <div th:if="${#lists.isEmpty(teams)}" class="empty-state glass-card"><i class="bi bi-people"></i><p>No teams found</p></div>
    <div class="row g-3">
        <div th:each="t : ${teams}" class="col-md-6 col-lg-4">
            <div class="glass-card h-100">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <img th:if="${t.logo != null and !t.logo.isEmpty()}" th:src="${t.logo}" class="rounded-circle" style="width:48px;height:48px;object-fit:cover" alt="">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" th:if="${t.logo == null or t.logo.isEmpty()}" style="width:48px;height:48px;background:var(--play26-primary);font-weight:700;font-size:1.2rem" th:text="${t.shortName} ?: T">T</div>
                    <div><h5 class="mb-0" th:text="${t.teamName}">Team</h5><small class="text-muted" th:text="${t.city}">City</small></div>
                    <span class="badge ms-auto" th:classappend="${t.status == 'ACTIVE' ? 'badge-active' : 'badge-cancelled'}" th:text="${t.status}">ACTIVE</span>
                </div>
                <div class="row g-2 text-center small mb-3">
                    <div class="col-3"><div class="stat-card p-2"><strong th:text="${t.matchesPlayed} ?: 0">0</strong><br><span class="text-muted">M</span></div></div>
                    <div class="col-3"><div class="stat-card p-2"><strong class="text-accent" th:text="${t.wins} ?: 0">0</strong><br><span class="text-muted">W</span></div></div>
                    <div class="col-3"><div class="stat-card p-2"><strong class="text-secondary-play26" th:text="${t.losses} ?: 0">0</strong><br><span class="text-muted">L</span></div></div>
                    <div class="col-3"><div class="stat-card p-2"><strong th:text="${t.points} ?: 0">0</strong><br><span class="text-muted">Pts</span></div></div>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/teams/view/{id}(id=${t.id})}" class="btn btn-glass btn-sm"><i class="bi bi-eye me-1"></i>View</a>
                    <a th:href="@{/teams/edit/{id}(id=${t.id})}" class="btn btn-glass btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
                    <form th:action="@{/teams/delete/{id}(id=${t.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-glass btn-sm text-danger btn-delete" data-confirm="Delete this team?"><i class="bi bi-trash"></i></button></form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body></html>
