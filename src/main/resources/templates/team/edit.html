<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Edit Team | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"></head>
<body>
<div class="play26-hero"><div class="container"><h1><i class="bi bi-pencil-square me-2"></i>Edit Team</h1></div></div>
<div class="container pb-5">
    <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a th:href="@{/teams}">Teams</a></li><li class="breadcrumb-item active">Edit</li></ol></nav>
    <div class="glass-card">
        <form th:action="@{/teams/update}" th:object="${team}" method="post" data-loading>
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Team Name *</label><input type="text" class="form-control" th:field="*{teamName}" required></div>
                <div class="col-md-3"><label class="form-label">Short Name</label><input type="text" class="form-control" th:field="*{shortName}" maxlength="10"></div>
                <div class="col-md-3"><label class="form-label">Team Code</label><input type="text" class="form-control" th:field="*{teamCode}" maxlength="10"></div>
                <div class="col-md-6"><label class="form-label">Tournament</label>
                    <select class="form-select" th:field="*{tournamentId}"><option value="">Select</option>
                        <option th:each="t : ${tournaments}" th:value="${t.id}" th:text="${t.tournamentName}"></option></select></div>
                <div class="col-md-6"><label class="form-label">City</label><input type="text" class="form-control" th:field="*{city}"></div>
                <div class="col-md-6"><label class="form-label">Coach</label><input type="text" class="form-control" th:field="*{coachName}"></div>
                <div class="col-md-6"><label class="form-label">Home Ground</label><input type="text" class="form-control" th:field="*{homeGround}"></div>
                <div class="col-md-6"><label class="form-label">Logo URL</label><input type="url" class="form-control" th:field="*{logo}" data-preview="logoPreview"></div>
                <div class="col-md-6"><img id="logoPreview" th:src="${team.logo}" alt="Logo" class="rounded" style="max-height:80px" th:style="${team.logo == null} ? 'display:none' : ''"></div>
                <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" th:field="*{description}" rows="3"></textarea></div>
                <div class="col-md-4"><label class="form-label">Status</label>
                    <select class="form-select" th:field="*{status}"><option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option></select></div>
                <div class="col-12 d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-play26"><i class="bi bi-check-lg me-1"></i>Update Team</button>
                    <a th:href="@{/teams/view/{id}(id=${team.id})}" class="btn btn-outline-play26">Cancel</a></div>
            </div>
        </form>
    </div>
</div>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body></html>
