<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Players | PLAY26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"></head>
<body>
<div class="play26-hero"><div class="container"><h1><i class="bi bi-person-badge-fill me-2"></i>Players</h1><p>Manage cricket players</p></div></div>
<div class="container pb-5">

    <div class="d-flex gap-2 mb-4">
        <button onclick="history.back()" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> Back</button>
        <a th:href="@{/dashboard}" class="btn btn-outline-primary btn-sm"><i class="bi bi-speedometer2"></i> Dashboard</a>
    </div>

    <div class="toast-container">
        <div th:if="${successMessage}" class="toast play26-toast success" role="alert"><div class="toast-body"><i class="bi bi-check-circle-fill text-success me-2"></i><span th:text="${successMessage}"></span></div></div>
        <div th:if="${errorMessage}" class="toast play26-toast error" role="alert"><div class="toast-body"><i class="bi bi-x-circle-fill text-danger me-2"></i><span th:text="${errorMessage}"></span></div></div>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">Total: <span class="text-play26" th:text="${totalCount} ?: 0">0</span></h5>
        <a th:href="@{/players/new}" class="btn btn-play26"><i class="bi bi-plus-lg me-1"></i>New Player</a>
    </div>
    <div th:if="${#lists.isEmpty(players)}" class="empty-state glass-card"><i class="bi bi-person-badge"></i><p>No players found</p></div>
    <div class="row g-3">
        <div th:each="p : ${players}" class="col-md-6 col-lg-4">
            <div class="glass-card h-100">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <img th:if="${p.photo != null and !p.photo.isEmpty()}" th:src="${p.photo}" class="rounded-circle" style="width:48px;height:48px;object-fit:cover" alt="">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" th:if="${p.photo == null or p.photo.isEmpty()}" style="width:48px;height:48px;background:var(--play26-secondary);font-weight:700;font-size:1.2rem">
                        <span th:text="${#strings.substring(p.playerName,0,1)}">P</span></div>
                    <div><h6 class="mb-0" th:text="${p.playerName}">Player</h6>
                        <small class="text-muted"><span th:text="${p.teamName}">Team</span> | #<span th:text="${p.jerseyNumber} ?: '-'">-</span></small></div>
                </div>
                <div class="d-flex gap-2 flex-wrap mb-3">
                    <span class="badge bg-secondary" th:text="${p.role} ?: 'N/A'">BATSMAN</span>
                    <span th:if="${p.captain}" class="badge" style="background:var(--play26-primary)">Captain</span>
                    <span th:if="${p.wicketKeeper}" class="badge" style="background:var(--play26-accent);color:#000">WK</span>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/players/view/{id}(id=${p.id})}" class="btn btn-glass btn-sm"><i class="bi bi-eye me-1"></i>View</a>
                    <a th:href="@{/players/edit/{id}(id=${p.id})}" class="btn btn-glass btn-sm"><i class="bi bi-pencil me-1"></i>Edit</a>
                    <form th:action="@{/players/delete/{id}(id=${p.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-glass btn-sm text-danger btn-delete" data-confirm="Delete this player?"><i class="bi bi-trash"></i></button></form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/play26.js}"></script>
</body></html>
